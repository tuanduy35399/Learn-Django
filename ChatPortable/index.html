<!DOCTYPE html>
<html>
<head>
    <title>Portable Chat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 95vh; margin: 0; padding: 10px; }
        h2 { text-align: center; color: #075e54; margin-top: 0; }
        #chat-box { flex: 1; border: 1px solid #ddd; background: white; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg { margin-bottom: 10px; padding: 8px 12px; background: #e1ffc7; border-radius: 18px; width: fit-content; max-width: 80%; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #input-area { display: flex; gap: 8px; background: white; padding: 10px; border-radius: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { flex: 1; padding: 10px; border: none; outline: none; font-size: 16px; }
        button { padding: 10px 20px; background: #075e54; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>
    <h2>Phòng Chat (LAN & Internet)</h2>
    <div id="chat-box"></div>
    <div id="input-area">
        <input id="msg" type="text" placeholder="Nhập tin nhắn..." onkeypress="if(event.keyCode==13) send()">
        <button onclick="send()">Gửi</button>
    </div>

    <script>
        function load() {
            fetch('/get').then(r => r.text()).then(t => {
                const box = document.getElementById('chat-box');
                const oldContent = box.innerHTML;
                const newContent = t.split('\n').filter(m => m.trim() !== '').map(m => `<div class="msg">${m}</div>`).join('');
                if (oldContent !== newContent) {
                    box.innerHTML = newContent;
                    box.scrollTop = box.scrollHeight;
                }
            });
        }
        function send() {
            let input = document.getElementById('msg');
            let m = input.value;
            if(!m) return;
            fetch('/send?m=' + encodeURIComponent(m)).then(() => {
                input.value = '';
                load();
            });
        }
        setInterval(load, 1000); 
        load();
    </script>
</body>
</html>
